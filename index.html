<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALGO DESK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Barlow:wght@400;500;600;700&display=swap');

  :root {
    --bg:     #07090f;
    --bg2:    #0d1220;
    --bg3:    #131926;
    --border: #1e2d45;
    --text:   #e8f0f8;
    --dim:    #6080a0;
    --green:  #2ecc71;
    --red:    #ff4d4d;
    --cyan:   #00d4f0;
    --orange: #ff8c42;
    --yellow: #ffd040;
    --purple: #b090ff;
    --mono:   'JetBrains Mono', monospace;
    --sans:   'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .title {
    font-family: var(--mono); font-size: 15px; letter-spacing: 3px;
    color: var(--cyan); text-shadow: 0 0 15px rgba(0,200,232,0.4);
  }
  .market-pill {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 10px;
    border: 1px solid;
  }
  .market-pill.open  { color: var(--green); border-color: var(--green); background: rgba(29,185,84,0.08); }
  .market-pill.closed{ color: var(--dim);   border-color: var(--dim);   background: transparent; }

  .topbar-right { display: flex; align-items: center; gap: 20px; }
  .sentiment-badge {
    font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 3px; text-transform: uppercase;
  }
  .sentiment-badge.bullish  { background: rgba(29,185,84,0.15);  color: var(--green);  border: 1px solid rgba(29,185,84,0.3); }
  .sentiment-badge.bearish  { background: rgba(232,64,58,0.15);  color: var(--red);    border: 1px solid rgba(232,64,58,0.3); }
  .sentiment-badge.neutral  { background: rgba(61,85,112,0.3);   color: var(--dim);    border: 1px solid var(--border); }

  .updated { font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .stale   { color: var(--orange) !important; }

  /* ── ACCOUNT BAR ── */
  .acct-bar {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .acct-item {
    flex: 1; padding: 10px 18px;
    border-right: 1px solid var(--border);
  }
  .acct-item:last-child { border-right: none; }
  .acct-lbl { font-size: 10px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin-bottom: 4px; }
  .acct-val { font-family: var(--mono); font-size: 20px; color: var(--text); font-weight: 500; }
  .green { color: var(--green); }
  .red   { color: var(--red); }
  .cyan  { color: var(--cyan); }

  /* ── MAIN ── */
  .main { padding: 14px 18px; max-width: 1400px; margin: 0 auto; }

  /* ── SECTION LABEL ── */
  .sec-label {
    font-size: 10px; letter-spacing: 3px; color: #5080a0;
    text-transform: uppercase; margin: 18px 0 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .sec-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── STRATEGY CARDS ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 8px; }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .card.live   { border-left: 3px solid var(--green); }
  .card.frozen { border-left: 3px solid var(--orange); }
  .card.dead   { border-left: 3px solid #2a3a50; opacity: 0.65; }
  .card.error  { border-left: 3px solid var(--red); }

  .card-head {
    padding: 9px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .card-name  { font-weight: 700; font-size: 13px; color: var(--text); }
  .card-ticker{ font-family: var(--mono); font-size: 11px; color: var(--cyan); margin-left: 7px; }
  .card-status{ font-family: var(--mono); font-size: 10px; letter-spacing: 1px; font-weight: 600; }
  .card-status.live   { color: var(--green); }
  .card-status.frozen { color: var(--orange); }
  .card-status.dead   { color: var(--dim); }
  .card-status.error  { color: var(--red); }

  .card-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; justify-content: space-between; align-items: center; }
  .k   { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; }
  .v   { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .v.long  { color: var(--green); font-weight: 700; }
  .v.short { color: var(--red); font-weight: 700; }
  .v.call  { color: var(--purple); font-weight: 700; }
  .v.put   { color: var(--orange); font-weight: 700; }
  .v.flat  { color: #3d5570; }
  .v.armed { color: var(--yellow); font-weight: 600; }
  .v.pos   { color: var(--green); }
  .v.neg   { color: var(--red); }

  /* ── POSITIONS TABLE ── */
  .tbl-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 8px 14px;
    font-size: 10px; letter-spacing: 2px; color: var(--dim);
    text-transform: uppercase;
    background: var(--bg3); border-bottom: 1px solid var(--border);
  }
  td {
    padding: 9px 14px; font-family: var(--mono); font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.015); }
  .empty { padding: 14px; color: var(--dim); font-family: var(--mono); font-size: 12px; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 24px; padding: 12px 18px;
    border-top: 1px solid var(--border);
    font-family: var(--mono); font-size: 10px; color: var(--dim);
    text-align: center;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Replace this with your actual Gist raw URL -->
<!-- Format: https://gist.githubusercontent.com/USERNAME/GIST_ID/raw/trading_status.json -->
<script>
  const GIST_URL = "https://api.github.com/gists/1f9a99ffa1b13c1386b9483180a55ea4";
  // e.g. "https://gist.githubusercontent.com/tarze/abc123/raw/trading_status.json"
</script>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="title">ALGO DESK</div>
    <div class="market-pill closed" id="marketPill">MARKET CLOSED</div>
  </div>
  <div class="topbar-right">
    <div class="sentiment-badge neutral" id="sentimentBadge">NEUTRAL</div>
    <div class="updated" id="updatedAt">Connecting...</div>
  </div>
</div>

<!-- Account bar -->
<div class="acct-bar">
  <div class="acct-item"><div class="acct-lbl">Portfolio</div><div class="acct-val cyan" id="aPortfolio">—</div></div>
  <div class="acct-item"><div class="acct-lbl">Cash</div><div class="acct-val" id="aCash">—</div></div>
  <div class="acct-item"><div class="acct-lbl">Buying Power</div><div class="acct-val" id="aBP">—</div></div>
  <div class="acct-item"><div class="acct-lbl">Today P&L</div><div class="acct-val" id="aPnl">—</div></div>
  <div class="acct-item"><div class="acct-lbl">Open Positions</div><div class="acct-val" id="aPositions">—</div></div>
</div>

<!-- Main content -->
<div class="main">

  <div class="sec-label">STRATEGIES</div>
  <div class="cards" id="cards">
    <div style="color:var(--dim);font-family:var(--mono);font-size:12px;padding:20px">Loading...</div>
  </div>

  <div class="sec-label">TODAY'S TRADES</div>
  <div class="tbl-wrap" id="tradesFeed">
    <div class="empty">No trades today</div>
  </div>

  <div class="sec-label">OPEN POSITIONS</div>
  <div class="tbl-wrap" id="posWrap">
    <div class="empty">No open positions</div>
  </div>

  <div class="footer">
    Data from GitHub Gist — updated every 1 min by monitor_agent.py
    &nbsp;·&nbsp; <span id="footerTime">—</span>
  </div>

</div>

<script>
const STRAT_META = {
  strategy_mstr:             {name:"MSTR Pivot",    ticker:"MSTR"},
  ma_crossover_meta:         {name:"META MA Cross", ticker:"META"},
  ma_crossover_tsla_options: {name:"TSLA Options",  ticker:"TSLA"},
  rsi_googl:                 {name:"GOOGL RSI+MACD",ticker:"GOOGL"},
  combo_amd:                 {name:"AMD Combo",     ticker:"AMD"},
  combo_nvda:                {name:"NVDA Multi-MA", ticker:"NVDA"},
  macd_msft:                 {name:"MSFT MACD",     ticker:"MSFT"},
  spread_amzn:               {name:"AMZN Spread",    ticker:"AMZN"},
};

function fmt$(v) {
  if (v == null || v === undefined) return "—";
  const abs = Math.abs(v);
  const s = abs >= 1000 ? (abs/1000).toFixed(1)+"k" : abs.toFixed(2);
  return (v < 0 ? "-" : "") + "$" + s;
}

function pnlColor(v) {
  return v == null ? "" : v >= 0 ? "green" : "red";
}

function posClass(p) {
  if (!p) return "flat";
  return p.toLowerCase();
}

function staleMins(updated_at) {
  if (!updated_at) return 999;
  try {
    // "2026-05-27 14:32:01 ET"
    const s = updated_at.replace(" ET","").replace(" ","T");
    const d = new Date(s);
    return (Date.now() - d.getTime()) / 60000;
  } catch { return 999; }
}

function renderTrades(strategies, alpacaTrades) {
  const feed = document.getElementById("tradesFeed");
  const ACTION_COLORS = {
    "BUY LONG":      {bg:"rgba(46,204,113,0.12)",  color:"#2ecc71", icon:"▲"},
    "SELL LONG":     {bg:"rgba(255,77,77,0.12)",   color:"#ff4d4d", icon:"▼"},
    "SHORT":         {bg:"rgba(255,140,66,0.12)",  color:"#ff8c42", icon:"▽"},
    "COVER":         {bg:"rgba(0,212,240,0.12)",   color:"#00d4f0", icon:"△"},
    "BUY CALL":      {bg:"rgba(176,144,255,0.12)", color:"#b090ff", icon:"C▲"},
    "SELL CALL":     {bg:"rgba(176,144,255,0.12)", color:"#b090ff", icon:"C▼"},
    "BUY PUT":       {bg:"rgba(255,140,66,0.12)",  color:"#ff8c42", icon:"P▲"},
    "SELL PUT":      {bg:"rgba(255,140,66,0.12)",  color:"#ff8c42", icon:"P▼"},
    "PROFIT HIT":    {bg:"rgba(46,204,113,0.2)",   color:"#2ecc71", icon:"★"},
    "CROSSOVER UP":  {bg:"rgba(46,204,113,0.08)",  color:"#2ecc71", icon:"↑"},
    "CROSSOVER DOWN":{bg:"rgba(255,77,77,0.08)",   color:"#ff4d4d", icon:"↓"},
  };

  // Use Alpaca order history if available (authoritative), else fall back to log parsing
  let all = [];
  if (alpacaTrades && alpacaTrades.length > 0) {
    all = alpacaTrades;
  } else {
    // Fall back to log-parsed trades
    for (const [key, d] of Object.entries(strategies)) {
      const meta = STRAT_META[key] || {ticker: key};
      for (const t of (d.trades_today || [])) {
        all.push({...t, ticker: meta.ticker});
      }
    }
  }

  if (!all.length) {
    feed.innerHTML = `<div class="empty">No trades today</div>`;
    return;
  }

  // Group by ticker, preserve time order within each group
  const groups = {};
  const groupOrder = [];
  for (const t of all) {
    if (!groups[t.ticker]) {
      groups[t.ticker] = [];
      groupOrder.push(t.ticker);
    }
    groups[t.ticker].push(t);
  }
  // Sort each group newest first
  for (const ticker of groupOrder) {
    groups[ticker].sort((a,b) => b.time.localeCompare(a.time));
  }
  // Sort group order by latest trade time
  groupOrder.sort((a,b) => {
    const aTime = groups[a][0]?.time || "";
    const bTime = groups[b][0]?.time || "";
    return bTime.localeCompare(aTime);
  });

  function tradeRow(t) {
    const ac = ACTION_COLORS[t.action] || {bg:"transparent", color:"var(--dim)", icon:"·"};
    const pnlNum = t.pnl ? parseFloat(t.pnl.replace(/[^0-9.-]/g,"")) : null;
    const pnlColor = pnlNum == null ? "var(--dim)" : pnlNum >= 0 ? "var(--green)" : "var(--red)";
    const isExit = t.is_exit;
    const entryCell = t.entry_price
      ? `<span style="color:var(--green);font-family:var(--mono)">$${t.entry_price}</span>`
      : !isExit
        ? `<span style="color:var(--green);font-family:var(--mono)">${t.price?"$"+t.price:"—"}</span>`
        : `<span style="color:var(--dim)">—</span>`;
    const exitCell = isExit && t.exit_price
      ? `<span style="color:var(--red);font-family:var(--mono)">$${t.exit_price}</span>`
      : !isExit
        ? `<span style="color:var(--dim);font-size:10px">open</span>`
        : `<span style="color:var(--dim)">—</span>`;
    const pnlCell = pnlNum != null
      ? `<span style="color:${pnlColor};font-weight:700;font-family:var(--mono)">${pnlNum>=0?"+":""}${t.pnl}</span>`
      : `<span style="color:var(--dim)">—</span>`;
    return `<tr style="${isExit?"":"opacity:0.65"}">
      <td style="color:var(--dim);font-family:var(--mono);font-size:11px;padding-left:24px">${t.time}</td>
      <td><span style="background:${ac.bg};color:${ac.color};padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;font-family:var(--mono)">${ac.icon} ${t.action}</span></td>
      <td>${entryCell}</td>
      <td>${exitCell}</td>
      <td>${pnlCell}</td>
    </tr>`;
  }

  let html = `<table>
    <tr>
      <th style="padding-left:24px">Time</th>
      <th>Action</th>
      <th>Entry</th>
      <th>Exit</th>
      <th>P&L</th>
    </tr>`;

  for (const ticker of groupOrder) {
    const trades = groups[ticker];
    // Calculate total P&L for this ticker
    let totalPnl = 0;
    let hasPnl = false;
    for (const t of trades) {
      if (t.pnl) {
        const n = parseFloat(t.pnl.replace(/[^0-9.-]/g,""));
        if (!isNaN(n)) { totalPnl += n; hasPnl = true; }
      }
    }
    const pnlStr  = hasPnl ? `${totalPnl>=0?"+":""}$${Math.abs(totalPnl).toFixed(2)}` : "";
    const pnlCol  = totalPnl >= 0 ? "var(--green)" : "var(--red)";
    const tradeCount = trades.length;

    // Ticker header row
    html += `<tr style="background:rgba(0,200,232,0.05);border-top:1px solid var(--border)">
      <td colspan="4" style="padding:6px 12px">
        <span style="color:var(--cyan);font-weight:900;font-family:var(--mono);font-size:13px">${ticker}</span>
        <span style="color:var(--dim);font-size:10px;margin-left:8px">${tradeCount} trade${tradeCount!==1?"s":""}</span>
      </td>
      <td style="padding:6px 12px;text-align:right">
        ${hasPnl ? `<span style="color:${pnlCol};font-family:var(--mono);font-weight:700;font-size:12px">${pnlStr}</span>` : ""}
      </td>
    </tr>`;

    // Trade rows
    html += trades.map(tradeRow).join("");
  }

  html += `</table>`;
  feed.innerHTML = html;
}

function render(data) {
  const stale = staleMins(data.updated_at) > 12;

  // Header
  const mkt = document.getElementById("marketPill");
  mkt.textContent = data.market_open ? "MARKET OPEN" : "MARKET CLOSED";
  mkt.className   = "market-pill " + (data.market_open ? "open" : "closed");

  const upEl = document.getElementById("updatedAt");
  upEl.textContent = "Updated " + (data.updated_at || "—");
  upEl.className   = "updated" + (stale ? " stale" : "");

  // Sentiment
  const sent = data.sentiment || "neutral";
  const sEl  = document.getElementById("sentimentBadge");
  sEl.textContent = sent.toUpperCase();
  sEl.className   = "sentiment-badge " + sent.toLowerCase();

  // Account
  const a = data.account || {};
  document.getElementById("aPortfolio").textContent = fmt$(a.portfolio);
  document.getElementById("aCash").textContent      = fmt$(a.cash);
  document.getElementById("aBP").textContent        = fmt$(a.buying_power);
  const pnlEl = document.getElementById("aPnl");
  pnlEl.textContent = fmt$(a.pnl_today);
  pnlEl.className   = "acct-val " + pnlColor(a.pnl_today);
  document.getElementById("aPositions").textContent = (a.positions ?? "—") + " open";
  document.getElementById("footerTime").textContent = data.updated_at || "—";

  // Strategy cards
  const cards = document.getElementById("cards");
  const strats = data.strategies || {};
  cards.innerHTML = Object.entries(strats).map(([key, d]) => {
    const meta = STRAT_META[key] || {name: key, ticker: ""};
    let statusClass = "dead", statusLabel = "STOPPED";
    if (d.running && d.frozen)  { statusClass="frozen"; statusLabel="FROZEN"; }
    else if (d.running)          { statusClass="live";   statusLabel="LIVE"; }
    if (d.errors > 0 && d.running) { statusClass="error"; statusLabel=`${d.errors} ERR`; }

    const pos     = d.position;
    const posDisp = pos
      ? `<span class="v ${posClass(pos)}">${pos.toUpperCase()}</span>`
      : `<span class="v flat">FLAT</span>`;

    const pnlDisp = d.pnl_today != null
      ? `<span class="v ${pnlColor(d.pnl_today)}">${d.pnl_today>=0?"+":""}${fmt$(d.pnl_today)}</span>`
      : `<span class="v flat">—</span>`;

    const rsiDisp = d.rsi != null
      ? `<span class="v" style="color:${d.rsi<=30?"var(--green)":d.rsi>=70?"var(--red)":"var(--text)"}">${d.rsi.toFixed(1)}</span>`
      : `<span class="v flat">—</span>`;

    const armedDisp = d.armed
      ? `<span class="v armed">⚡ ${d.armed}</span>`
      : `<span class="v flat">—</span>`;

    const sigDisp = d.last_signal
      ? `<span class="v" style="color:var(--cyan);font-size:10px">${d.last_signal}</span>`
      : `<span class="v flat">—</span>`;

    const tickDisp = d.last_tick
      ? `<span style="font-family:var(--mono);font-size:10px;color:${d.frozen?"var(--orange)":"var(--dim)"}">${d.last_tick.slice(11)}</span>`
      : `<span style="color:var(--dim)">—</span>`;

    return `<div class="card ${statusClass}">
      <div class="card-head">
        <div><span class="card-name">${meta.name}</span><span class="card-ticker">${meta.ticker}</span></div>
        <span class="card-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="card-body">
        <div class="row"><span class="k">Position</span>${posDisp}</div>
        <div class="row">
          <span class="k">Entry</span>
          <span class="v">${d.entry_price!=null?"$"+d.entry_price.toFixed(2):"—"}</span>
          <span class="k" style="margin-left:10px">Day P&L</span>${pnlDisp}
        </div>
        <div class="row">
          <span class="k">RSI</span>${rsiDisp}
          <span class="k" style="margin-left:10px">Last tick</span>${tickDisp}
        </div>
        <div class="row"><span class="k">Armed</span>${armedDisp}</div>
        <div class="row"><span class="k">Signal</span>${sigDisp}</div>
      </div>
    </div>`;
  }).join("");

  // Trades feed
  renderTrades(data.strategies || {}, data.alpaca_trades || []);

  // Positions table
  const pos = data.positions || {};
  const entries = Object.entries(pos);
  const posWrap = document.getElementById("posWrap");
  if (!entries.length) {
    posWrap.innerHTML = `<div class="empty">No open positions</div>`;
    return;
  }
  posWrap.innerHTML = `<table>
    <tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Unreal P&L</th></tr>
    ${entries.map(([sym,p])=>`<tr>
      <td style="color:var(--cyan);font-weight:700">${sym}</td>
      <td style="color:${p.side==="long"?"var(--green)":"var(--red)"}">${p.side.toUpperCase()}</td>
      <td>${Math.abs(p.qty)}</td>
      <td style="color:${p.unrealized_pl>=0?"var(--green)":"var(--red)"}">${p.unrealized_pl>=0?"+":""}${fmt$(p.unrealized_pl)}</td>
    </tr>`).join("")}
  </table>`;
}

async function fetchData() {
  try {
    const res = await fetch(GIST_URL, {
      headers: { "Accept": "application/vnd.github.v3+json" }
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const gist = await res.json();
    // GitHub API returns file content nested under files
    const content = gist.files?.["trading_status.json"]?.content;
    if (!content) throw new Error("trading_status.json not found in gist");
    const data = JSON.parse(content);
    render(data);
  } catch(e) {
    document.getElementById("updatedAt").textContent = "⚠ " + e.message;
    document.getElementById("updatedAt").className = "updated stale";
  }
}

fetchData();
setInterval(fetchData, 60000);  // refresh every 60s — matches monitor_agent push interval
</script>
</body>
</html>
